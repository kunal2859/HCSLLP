name: DevOps Unified Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Code Quality (Fast, on Cloud)
  # ─────────────────────────────────────────
  code-quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Lint Tools
        run: pip install ruff mypy
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy . --ignore-missing-imports --exclude venv

  # ─────────────────────────────────────────
  # Stage 2: Model Training (Only on Data Change, on Mac)
  # ─────────────────────────────────────────
  train:
    name: Auto Train (GPU)
    runs-on: self-hosted
    needs: code-quality
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Check for Data Changes
        id: check_data
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "data/raw/devops_qa.json"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Training Deps
        if: steps.check_data.outputs.changed == 'true'
        run: pip install -r requirements.txt

      - name: Training (MPS)
        if: steps.check_data.outputs.changed == 'true'
        run: |
          python3 training/preprocess.py
          python3 training/train.py

      - name: Upload New Adapter
        if: steps.check_data.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/lora_adapter/
          retention-days: 7

  # ─────────────────────────────────────────
  # Stage 3: Model Evaluation (On Mac)
  # ─────────────────────────────────────────
  evaluation:
    name: ROUGE Evaluation
    runs-on: self-hosted
    needs: train
    if: always() && (needs.train.result == 'success' || needs.train.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Eval Deps
        run: |
          pip install -r requirements.txt
          pip install rouge-score

      - name: Download New Adapter (if trained)
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/lora_adapter/
        continue-on-error: true

      - name: ROUGE Gate (Assertion)
        run: python3 evaluation/evaluate.py --ci

  # ─────────────────────────────────────────
  # Stage 4: Docker Build & Push (Cloud)
  # ─────────────────────────────────────────
  docker-build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: evaluation
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & Push
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/devops-mcp:latest -f docker/Dockerfile.mcp .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/devops-mcp:latest

  # ─────────────────────────────────────────
  # Stage 5: Deploy via SSH (Optional - only if DEPLOY_HOST is set)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Server (Optional)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && secrets.DEPLOY_HOST != ''
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "⚠️  DEPLOY_HOST not set. Skipping deployment."
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p ~/devops-assistant"
          scp -i ~/.ssh/deploy_key docker-compose.yml "$DEPLOY_USER@$DEPLOY_HOST:~/devops-assistant/"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "
            echo '$GHCR_TOKEN' | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin && \
            cd ~/devops-assistant && \
            IMAGE_OWNER=${{ env.IMAGE_OWNER }} REGISTRY=${{ env.REGISTRY }} docker compose pull && \
            IMAGE_OWNER=${{ env.IMAGE_OWNER }} REGISTRY=${{ env.REGISTRY }} docker compose up -d
          "
